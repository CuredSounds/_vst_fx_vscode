name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --target test_example
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
